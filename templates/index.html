<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票趨勢偵測器</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --bullish: #3fb950;
      --bearish: #f85149;
      --neutral: #d29922;
      --accent: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    header .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #refresh-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }
    #refresh-btn:hover { opacity: 0.85; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .summary-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 110px;
    }
    .summary-card .count {
      font-size: 2rem;
      font-weight: 800;
    }
    .summary-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .summary-card.bull .count { color: var(--bullish); }
    .summary-card.bear .count { color: var(--bearish); }
    .summary-card.neu  .count { color: var(--neutral); }

    .market-meter {
      flex: 1;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .meter-label { font-size: 0.75rem; color: var(--muted); }
    .meter-bar {
      height: 10px;
      border-radius: 5px;
      background: var(--border);
      overflow: hidden;
      display: flex;
    }
    .meter-bar .seg-bull { background: var(--bullish); transition: width 0.6s; }
    .meter-bar .seg-neu  { background: var(--neutral);  transition: width 0.6s; }
    .meter-bar .seg-bear { background: var(--bearish);  transition: width 0.6s; }

    .controls {
      padding: 0 24px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); }
    .filter-btn.active.bull { background: var(--bullish); border-color: var(--bullish); color: #000; }
    .filter-btn.active.bear { background: var(--bearish); border-color: var(--bearish); color: #fff; }
    .filter-btn.active.neu  { background: var(--neutral);  border-color: var(--neutral);  color: #000; }
    .filter-btn.active.all  { background: var(--accent);   border-color: var(--accent);   color: #000; }

    #search {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 0.85rem;
      outline: none;
      width: 180px;
    }
    #search:focus { border-color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 4px 24px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: transform 0.15s, border-color 0.15s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .card.bullish::before { background: var(--bullish); }
    .card.bearish::before { background: var(--bearish); }
    .card.neutral::before { background: var(--neutral); }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .ticker {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .trend-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .trend-badge.bullish { background: rgba(63,185,80,0.15); color: var(--bullish); }
    .trend-badge.bearish { background: rgba(248,81,73,0.15);  color: var(--bearish); }
    .trend-badge.neutral { background: rgba(210,153,34,0.15); color: var(--neutral); }
    .trend-badge.unknown { background: rgba(139,148,158,0.15);color: var(--muted); }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .price { font-size: 1.4rem; font-weight: 700; }
    .change { font-size: 0.85rem; font-weight: 600; }
    .change.pos { color: var(--bullish); }
    .change.neg { color: var(--bearish); }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .metric {
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 8px;
    }
    .metric .m-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .metric .m-val   { font-size: 0.9rem; font-weight: 600; margin-top: 1px; }

    .signals-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .sig {
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .sig.bullish { background: rgba(63,185,80,0.12); color: var(--bullish); }
    .sig.bearish { background: rgba(248,81,73,0.12);  color: var(--bearish); }
    .sig.neutral { background: rgba(210,153,34,0.12); color: var(--neutral); }

    .score-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--muted); font-size: 0.9rem; }

    #timestamp {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0 24px 12px;
    }

    .rsi-val { }
    .rsi-val.overbought { color: var(--bearish); }
    .rsi-val.oversold   { color: var(--bullish); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; padding: 4px 12px 24px; }
      header, .summary-bar, .controls, #timestamp { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>股票趨勢偵測器</h1>
    <div class="subtitle">100 支股票 · 多指標綜合判斷 (RSI · MACD · MA · 動能)</div>
  </div>
  <button id="refresh-btn" onclick="loadStocks()">重新整理</button>
</header>

<div class="summary-bar" id="summary-bar">
  <div class="summary-card bull"><span class="count" id="cnt-bull">—</span><span class="label">看漲 (Bullish)</span></div>
  <div class="summary-card neu"><span class="count" id="cnt-neu">—</span><span class="label">中立 (Neutral)</span></div>
  <div class="summary-card bear"><span class="count" id="cnt-bear">—</span><span class="label">看跌 (Bearish)</span></div>
  <div class="market-meter">
    <span class="meter-label">市場情緒分佈</span>
    <div class="meter-bar">
      <div class="seg-bull" id="meter-bull" style="width:0%"></div>
      <div class="seg-neu"  id="meter-neu"  style="width:0%"></div>
      <div class="seg-bear" id="meter-bear" style="width:0%"></div>
    </div>
    <span class="meter-label" id="meter-text">載入中…</span>
  </div>
</div>

<div class="controls">
  <button class="filter-btn active all" data-filter="all" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn bull" data-filter="bullish" onclick="setFilter('bullish',this)">看漲</button>
  <button class="filter-btn neu"  data-filter="neutral" onclick="setFilter('neutral',this)">中立</button>
  <button class="filter-btn bear" data-filter="bearish" onclick="setFilter('bearish',this)">看跌</button>
  <input id="search" type="text" placeholder="搜尋股票代碼…" oninput="renderCards()" />
</div>

<div id="timestamp"></div>
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">正在載入 100 支股票資料，請稍候（約 30-60 秒）…</div>
</div>
<div class="grid" id="grid"></div>

<script>
  let allStocks = [];
  let currentFilter = 'all';

  const trendLabel = { bullish: '看漲', bearish: '看跌', neutral: '中立', unknown: '未知' };
  const trendEmoji = { bullish: '▲', bearish: '▼', neutral: '—', unknown: '?' };

  async function loadStocks() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '載入中…';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('grid').innerHTML = '';
    document.getElementById('timestamp').textContent = '';

    try {
      const res = await fetch('/api/stocks');
      const data = await res.json();
      allStocks = data.stocks;
      updateSummary(data.summary, allStocks.length);
      renderCards();
      document.getElementById('timestamp').textContent =
        `最後更新：${new Date().toLocaleString('zh-TW')}`;
    } catch (e) {
      document.getElementById('loading').innerHTML =
        `<div style="color:var(--bearish)">載入失敗：${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '重新整理';
      document.getElementById('loading').style.display = 'none';
    }
  }

  function updateSummary(s, total) {
    document.getElementById('cnt-bull').textContent = s.bullish;
    document.getElementById('cnt-neu').textContent  = s.neutral;
    document.getElementById('cnt-bear').textContent = s.bearish;

    const pBull = (s.bullish / total * 100).toFixed(1);
    const pNeu  = (s.neutral  / total * 100).toFixed(1);
    const pBear = (s.bearish  / total * 100).toFixed(1);

    document.getElementById('meter-bull').style.width = pBull + '%';
    document.getElementById('meter-neu').style.width  = pNeu  + '%';
    document.getElementById('meter-bear').style.width = pBear + '%';
    document.getElementById('meter-text').textContent =
      `看漲 ${pBull}%  ·  中立 ${pNeu}%  ·  看跌 ${pBear}%`;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderCards();
  }

  function renderCards() {
    const q = document.getElementById('search').value.trim().toUpperCase();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const filtered = allStocks.filter(s => {
      if (q && !s.ticker.includes(q)) return false;
      if (currentFilter !== 'all' && s.trend !== currentFilter) return false;
      return true;
    });

    filtered.forEach(s => grid.appendChild(buildCard(s)));
  }

  function buildCard(s) {
    if (s.error) {
      const div = document.createElement('div');
      div.className = 'card unknown';
      div.innerHTML = `<div class="card-header"><span class="ticker">${s.ticker}</span><span class="trend-badge unknown">錯誤</span></div><div style="font-size:0.75rem;color:var(--muted)">${s.error}</div>`;
      return div;
    }

    const div = document.createElement('div');
    div.className = `card ${s.trend}`;

    const chgClass = s.change_pct >= 0 ? 'pos' : 'neg';
    const chgSign  = s.change_pct >= 0 ? '+' : '';

    // Score bar: score range -5 to +5
    const scoreWidth = ((s.score + 5) / 10 * 100).toFixed(0);
    const scoreFill  = s.trend === 'bullish' ? 'var(--bullish)' : s.trend === 'bearish' ? 'var(--bearish)' : 'var(--neutral)';

    const rsiClass = s.rsi >= 70 ? 'overbought' : s.rsi <= 30 ? 'oversold' : '';

    const signalsHtml = Object.entries(s.signals || {}).map(([name, val]) =>
      `<span class="sig ${val}">${name}</span>`
    ).join('');

    div.innerHTML = `
      <div class="card-header">
        <span class="ticker">${s.ticker}</span>
        <span class="trend-badge ${s.trend}">${trendEmoji[s.trend]} ${trendLabel[s.trend]}</span>
      </div>
      <div class="score-bar"><div class="score-fill" style="width:${scoreWidth}%;background:${scoreFill}"></div></div>
      <div class="price-row">
        <span class="price">$${s.price.toLocaleString()}</span>
        <span class="change ${chgClass}">${chgSign}${s.change_pct}%</span>
      </div>
      <div class="metrics">
        <div class="metric"><div class="m-label">RSI(14)</div><div class="m-val rsi-val ${rsiClass}">${s.rsi}</div></div>
        <div class="metric"><div class="m-label">5日動能</div><div class="m-val ${s.momentum_5d >= 0 ? 'pos' : 'neg'} change">${s.momentum_5d >= 0 ? '+' : ''}${s.momentum_5d}%</div></div>
        <div class="metric"><div class="m-label">MA20</div><div class="m-val">$${s.ma20}</div></div>
        <div class="metric"><div class="m-label">MA50</div><div class="m-val">$${s.ma50}</div></div>
      </div>
      <div class="signals-row">${signalsHtml}</div>
    `;
    return div;
  }

  loadStocks();
</script>
</body>
</html>
