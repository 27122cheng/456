<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票趨勢分析 · TradingView</title>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
      --text:#c9d1d9; --muted:#8b949e;
      --bullish:#3fb950; --bearish:#f85149; --neutral:#d29922; --accent:#58a6ff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Header ── */
    header{background:var(--surface);border-bottom:1px solid var(--border);
      padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .sub{font-size:.72rem;color:var(--muted);margin-top:2px}
    .tv-badge{
      background:rgba(41,98,255,.15);color:#2962ff;
      border:1px solid rgba(41,98,255,.3);
      padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700}

    /* ── Search ── */
    .search-section{padding:18px 24px 10px;max-width:700px}
    .search-section h2{font-size:.95rem;font-weight:600;margin-bottom:10px}
    .search-wrap{position:relative;display:flex;gap:0}
    #hero-input{
      flex:1;background:var(--surface);border:1px solid var(--border);border-right:none;
      color:var(--text);padding:10px 16px;border-radius:8px 0 0 8px;
      font-size:1rem;outline:none;transition:border-color .2s}
    #hero-input:focus{border-color:var(--accent)}
    #hero-input::placeholder{color:var(--muted)}
    #go-btn{
      background:var(--accent);color:#0d1117;border:none;
      padding:10px 22px;border-radius:0 8px 8px 0;font-weight:700;font-size:.9rem;
      cursor:pointer;transition:opacity .2s;white-space:nowrap}
    #go-btn:hover{opacity:.85}
    #autocomplete{
      position:absolute;top:100%;left:0;right:0;z-index:200;
      background:var(--surface);border:1px solid var(--border);border-top:none;
      border-radius:0 0 8px 8px;overflow:hidden;display:none}
    .ac-item{
      padding:9px 16px;cursor:pointer;display:flex;justify-content:space-between;
      align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .1s}
    .ac-item:last-child{border-bottom:none}
    .ac-item:hover,.ac-item.focused{background:var(--surface2)}
    .ac-sym{font-weight:700;font-size:.88rem;color:var(--accent);min-width:70px}
    .ac-name{font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ac-exch{font-size:.68rem;color:var(--muted);white-space:nowrap}

    /* ── Analysis Panel ── */
    #analysis-panel{
      display:none;padding:0 24px 20px;
      animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .panel-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .panel-title{font-size:1.1rem;font-weight:700}
    .panel-symbol{font-size:.8rem;color:var(--muted)}
    .close-btn{
      background:none;border:1px solid var(--border);color:var(--muted);
      padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .15s}
    .close-btn:hover{border-color:var(--bearish);color:var(--bearish)}
    .interval-btns{display:flex;gap:4px}
    .ivl-btn{
      background:var(--surface2);border:1px solid var(--border);color:var(--muted);
      padding:4px 10px;border-radius:5px;cursor:pointer;font-size:.75rem;transition:all .15s}
    .ivl-btn:hover,.ivl-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}

    .tv-grid{
      display:grid;grid-template-columns:1fr 380px;gap:12px;
      height:500px}
    @media(max-width:900px){
      .tv-grid{grid-template-columns:1fr;height:auto}
      .tv-grid>div{height:420px}}
    .tv-box{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;position:relative}
    .tv-loading{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:10px;z-index:1;pointer-events:none}
    .tv-loading.hidden{display:none}
    .spinner{width:32px;height:32px;border:3px solid var(--border);
      border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tv-loading p{font-size:.78rem;color:var(--muted)}

    /* ── Sector tabs ── */
    .sector-row{
      display:flex;gap:6px;padding:12px 24px 0;overflow-x:auto;
      scrollbar-width:none;flex-wrap:nowrap}
    .sector-row::-webkit-scrollbar{display:none}
    .sec-btn{
      padding:5px 14px;border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-size:.78rem;white-space:nowrap;
      cursor:pointer;transition:all .15s;flex-shrink:0}
    .sec-btn:hover{border-color:var(--accent);color:var(--text)}
    .sec-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}

    /* ── Stock Grid ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
      gap:8px;padding:12px 24px 32px}
    .stock-card{
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      position:relative;overflow:hidden}
    .stock-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
    .stock-card:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--surface2)}
    .stock-card.active{border-color:var(--accent);background:rgba(88,166,255,.08)}
    .card-ticker{font-size:1rem;font-weight:800;color:var(--text)}
    .card-name{font-size:.65rem;color:var(--muted);line-height:1.3;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
    .card-sector-dot{
      width:6px;height:6px;border-radius:50%;margin-top:2px;flex-shrink:0}

    /* sector colors */
    .dot-tech   {background:#58a6ff}
    .dot-finance{background:#3fb950}
    .dot-health {background:#79c0ff}
    .dot-cons-d {background:#ffa657}
    .dot-cons-s {background:#d2a8ff}
    .dot-energy {background:#f85149}
    .dot-comm   {background:#d29922}
    .dot-indust {background:#7ee787}
    .dot-other  {background:#8b949e}

    /* legend */
    .legend{display:flex;gap:12px;flex-wrap:wrap;padding:4px 24px 8px;font-size:.68rem;color:var(--muted)}
    .legend span{display:flex;align-items:center;gap:4px}
    .legend-dot{width:7px;height:7px;border-radius:50%}

    hr.divider{border:none;border-top:1px solid var(--border);margin:8px 0}

    @media(max-width:600px){
      .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));padding:10px 12px 24px}
      header,.search-section,#analysis-panel,.sector-row,.legend{padding-left:12px;padding-right:12px}
    }
  </style>
</head>
<body>

<header>
  <div>
    <div style="display:flex;align-items:center;gap:8px">
      <h1>股票趨勢分析</h1>
      <span class="tv-badge">TradingView 數據</span>
    </div>
    <div class="sub">技術分析 · 振盪指標 · 均線系統 · 即時買賣訊號</div>
  </div>
</header>

<!-- ── Search ── -->
<div class="search-section">
  <h2>搜尋任意股票 / ETF / 指數</h2>
  <div class="search-wrap">
    <input id="hero-input" type="text"
      placeholder="輸入代碼或名稱，例：AAPL、2330、台積電、SPY…"
      autocomplete="off" />
    <div id="autocomplete"></div>
    <button id="go-btn" onclick="analyzeSymbol(document.getElementById('hero-input').value.trim())">分析</button>
  </div>
</div>

<!-- ── Analysis Panel ── -->
<div id="analysis-panel">
  <hr class="divider" />
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-title">—</div>
      <div class="panel-symbol" id="panel-symbol"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="interval-btns" id="interval-btns">
        <button class="ivl-btn" data-iv="1">1分</button>
        <button class="ivl-btn" data-iv="5">5分</button>
        <button class="ivl-btn" data-iv="15">15分</button>
        <button class="ivl-btn" data-iv="60">1時</button>
        <button class="ivl-btn active" data-iv="D">日</button>
        <button class="ivl-btn" data-iv="W">週</button>
      </div>
      <button class="close-btn" onclick="closePanel()">✕ 關閉</button>
    </div>
  </div>
  <div class="tv-grid">
    <!-- Chart -->
    <div class="tv-box" id="chart-box">
      <div class="tv-loading" id="chart-loading">
        <div class="spinner"></div><p>載入圖表中…</p>
      </div>
      <div id="chart-widget" style="height:100%"></div>
    </div>
    <!-- Technical Analysis -->
    <div class="tv-box" id="ta-box">
      <div class="tv-loading" id="ta-loading">
        <div class="spinner"></div><p>載入技術分析…</p>
      </div>
      <div id="ta-widget" style="height:100%"></div>
    </div>
  </div>
</div>

<hr class="divider" style="margin:4px 24px" />

<!-- ── Sector tabs ── -->
<div class="sector-row" id="sector-row">
  <button class="sec-btn active" onclick="filterSector('all',this)">全部 (100)</button>
  <button class="sec-btn" onclick="filterSector('tech',this)">科技 (25)</button>
  <button class="sec-btn" onclick="filterSector('finance',this)">金融 (15)</button>
  <button class="sec-btn" onclick="filterSector('health',this)">醫療 (10)</button>
  <button class="sec-btn" onclick="filterSector('cons-d',this)">非必需消費 (10)</button>
  <button class="sec-btn" onclick="filterSector('cons-s',this)">必需消費 (8)</button>
  <button class="sec-btn" onclick="filterSector('energy',this)">能源 (8)</button>
  <button class="sec-btn" onclick="filterSector('comm',this)">通訊 (6)</button>
  <button class="sec-btn" onclick="filterSector('indust',this)">工業 (8)</button>
  <button class="sec-btn" onclick="filterSector('other',this)">材料/公用/REITs (10)</button>
</div>

<!-- Legend -->
<div class="legend">
  <span><span class="legend-dot" style="background:#58a6ff"></span>科技</span>
  <span><span class="legend-dot" style="background:#3fb950"></span>金融</span>
  <span><span class="legend-dot" style="background:#79c0ff"></span>醫療</span>
  <span><span class="legend-dot" style="background:#ffa657"></span>非必需消費</span>
  <span><span class="legend-dot" style="background:#d2a8ff"></span>必需消費</span>
  <span><span class="legend-dot" style="background:#f85149"></span>能源</span>
  <span><span class="legend-dot" style="background:#d29922"></span>通訊</span>
  <span><span class="legend-dot" style="background:#7ee787"></span>工業</span>
  <span><span class="legend-dot" style="background:#8b949e"></span>材料/公用/REITs</span>
</div>

<!-- ── Stock Grid ── -->
<div class="grid" id="stock-grid"></div>

// ── State ─────────────────────────────────────────────────────────────────────
let currentSymbol = null, currentInterval = "D", currentFilter = "all";
let acTimer = null, acFocused = -1;

// ── Grid ──────────────────────────────────────────────────────────────────────
function filterSector(sector, btn) {
  currentFilter = sector;
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('stock-grid');
  grid.innerHTML = '';
  const list = currentFilter === 'all' ? STOCKS : STOCKS.filter(s => s.s === currentFilter);
  list.forEach(stock => {
    const card = document.createElement('div');
    card.className = 'stock-card' + (currentSymbol === stock.t ? ' active' : '');
    card.id = 'card-' + stock.t;
    card.onclick = () => analyzeSymbol(stock.t, stock.n);
    card.innerHTML = `
      <div class="card-ticker">${stock.t}</div>
      <div class="card-name">${stock.n}</div>
      <div class="card-sector-dot dot-${stock.s}"></div>`;
    grid.appendChild(card);
  });
}

// ── TradingView Widgets ───────────────────────────────────────────────────────
function createChartWidget(symbol, interval) {
  const container = document.getElementById('chart-widget');
  container.innerHTML = '';
  document.getElementById('chart-loading').classList.remove('hidden');

  const div = document.createElement('div');
  div.className = 'tradingview-widget-container';
  div.style.height = '100%';

  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';
  inner.style.height = 'calc(100% - 32px)';

  const cr = document.createElement('div');
  cr.className = 'tradingview-widget-copyright';
  cr.style.cssText = 'text-align:center;font-size:11px;padding:4px;';
  cr.innerHTML = '<a href="https://www.tradingview.com/" target="_blank" style="color:var(--muted)">Powered by TradingView</a>';

  const script = document.createElement('script');
  script.type = 'text/javascript';
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  script.async = true;
  script.onload = () => document.getElementById('chart-loading').classList.add('hidden');
  script.text = JSON.stringify({
    autosize: true,
    symbol: symbol,
    interval: interval,
    timezone: "Asia/Taipei",
    theme: "dark",
    style: "1",
    locale: "zh_TW",
    toolbar_bg: "#161b22",
    enable_publishing: false,
    allow_symbol_change: true,
    save_image: false,
    hide_side_toolbar: false,
    studies: ["MACD@tv-basicstudies", "RSI@tv-basicstudies"],
    withdateranges: true,
    support_host: "https://www.tradingview.com"
  });

  div.appendChild(inner);
  div.appendChild(cr);
  div.appendChild(script);
  container.appendChild(div);
}

function createTAWidget(symbol, interval) {
  const container = document.getElementById('ta-widget');
  container.innerHTML = '';
  document.getElementById('ta-loading').classList.remove('hidden');

  const div = document.createElement('div');
  div.className = 'tradingview-widget-container';
  div.style.height = '100%';

  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget';

  const script = document.createElement('script');
  script.type = 'text/javascript';
  script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
  script.async = true;
  script.onload = () => document.getElementById('ta-loading').classList.add('hidden');
  script.text = JSON.stringify({
    interval: interval,
    width: "100%",
    isTransparent: true,
    height: "100%",
    symbol: symbol,
    showIntervalTabs: true,
    displayMode: "multiple",
    locale: "zh_TW",
    colorTheme: "dark"
  });

  div.appendChild(inner);
  div.appendChild(script);
  container.appendChild(div);
}

// ── Analyze symbol ────────────────────────────────────────────────────────────
function analyzeSymbol(raw, nameHint) {
  const symbol = raw.trim().toUpperCase();
  if (!symbol) return;
  closeAC();

  currentSymbol = symbol;
  document.getElementById('hero-input').value = symbol;

  // Update panel header
  const meta = STOCKS.find(s => s.t === symbol);
  const name = nameHint || meta?.n || '';
  document.getElementById('panel-title').textContent = name ? `${symbol}  ${name}` : symbol;
  document.getElementById('panel-symbol').textContent = `TradingView 技術分析 · ${intervalLabel(currentInterval)}`;

  // Show panel
  document.getElementById('analysis-panel').style.display = 'block';
  document.getElementById('analysis-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Highlight card
  document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + symbol)?.classList.add('active');

  // Load widgets
  createChartWidget(symbol, currentInterval);
  createTAWidget(symbol, currentInterval);
}

function closePanel() {
  document.getElementById('analysis-panel').style.display = 'none';
  document.getElementById('chart-widget').innerHTML = '';
  document.getElementById('ta-widget').innerHTML = '';
  document.querySelectorAll('.stock-card').forEach(c => c.classList.remove('active'));
  currentSymbol = null;
  document.getElementById('hero-input').value = '';
}

function intervalLabel(iv) {
  const map = {'1':'1分鐘','5':'5分鐘','15':'15分鐘','60':'1小時','D':'日線','W':'週線'};
  return map[iv] || iv;
}

// Interval buttons
document.getElementById('interval-btns').addEventListener('click', e => {
  const btn = e.target.closest('.ivl-btn');
  if (!btn) return;
  document.querySelectorAll('.ivl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentInterval = btn.dataset.iv;
  if (currentSymbol) {
    document.getElementById('panel-symbol').textContent = `TradingView 技術分析 · ${intervalLabel(currentInterval)}`;
    createChartWidget(currentSymbol, currentInterval);
    createTAWidget(currentSymbol, currentInterval);
  }
});

// ── Autocomplete ──────────────────────────────────────────────────────────────
const heroInput   = document.getElementById('hero-input');
const acBox       = document.getElementById('autocomplete');

heroInput.addEventListener('input', () => {
  clearTimeout(acTimer);
  const q = heroInput.value.trim();
  if (!q) { closeAC(); return; }
  // Local fast search first
  const local = STOCKS.filter(s =>
    s.t.startsWith(q.toUpperCase()) || s.n.toLowerCase().includes(q.toLowerCase())
  ).slice(0, 6);
  if (local.length) renderAC(local.map(s => ({ ticker: s.t, name: s.n, exchange: '' })));
  // Then server search (if API available)
  acTimer = setTimeout(() => serverSearch(q), 300);
});

heroInput.addEventListener('keydown', e => {
  const items = acBox.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1, items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1, items); }
  else if (e.key === 'Enter') {
    if (acFocused >= 0 && items[acFocused]) items[acFocused].click();
    else analyzeSymbol(heroInput.value.trim());
  }
  else if (e.key === 'Escape') closeAC();
});

document.addEventListener('click', e => {
  if (!heroInput.contains(e.target) && !acBox.contains(e.target)) closeAC();
});

function moveFocus(dir, items) {
  if (!items.length) return;
  items[acFocused]?.classList.remove('focused');
  acFocused = Math.max(0, Math.min(items.length - 1, acFocused + dir));
  items[acFocused].classList.add('focused');
}

function renderAC(results) {
  acFocused = -1;
  acBox.innerHTML = results.map(r => `
    <div class="ac-item" data-ticker="${r.ticker}">
      <span class="ac-sym">${r.ticker}</span>
      <span class="ac-name">${r.name}</span>
      <span class="ac-exch">${r.exchange}</span>
    </div>`).join('');
  acBox.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('click', () => {
      heroInput.value = item.dataset.ticker;
      closeAC();
      analyzeSymbol(item.dataset.ticker);
    });
  });
  acBox.style.display = 'block';
}

function closeAC() { acBox.style.display = 'none'; acBox.innerHTML = ''; acFocused = -1; }

async function serverSearch(q) {
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) return;
    const { results } = await res.json();
    if (results?.length) renderAC(results);
  } catch (_) { /* API not available, local results shown */ }
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderGrid();
</script>
