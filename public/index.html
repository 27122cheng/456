<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>台灣股市儀表板</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#c9d1d9;--muted:#8b949e;
  --bullish:#3fb950;--bearish:#f85149;--neutral:#d29922;--accent:#58a6ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}

/* ── Top Nav ── */
#top-nav{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:0;flex-wrap:wrap}
.nav-brand{font-size:1.1rem;font-weight:800;color:var(--accent);
  padding:14px 20px 14px 0;border-right:1px solid var(--border);margin-right:4px;white-space:nowrap}
.nav-tab{padding:16px 18px;font-size:.88rem;font-weight:600;color:var(--muted);
  border:none;background:none;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Pages ── */
.page{display:none;min-height:calc(100vh - 57px)}
.page.active{display:block}
.container{max-width:1400px;margin:0 auto;padding:20px}

/* ── Section headers ── */
.sec-hdr{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.sec-hdr span{font-size:.75rem;font-weight:400;color:var(--muted)}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.grid-4{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}}

/* ── Index Cards ── */
.index-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.index-card-header{padding:10px 14px 4px;display:flex;justify-content:space-between;align-items:center}
.index-name{font-size:.8rem;color:var(--muted);font-weight:600}
.index-tv{height:130px}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;gap:3px;font-size:.72rem;font-weight:700;
  padding:2px 8px;border-radius:10px}
.pill-bull{background:rgba(63,185,80,.15);color:var(--bullish)}
.pill-bear{background:rgba(248,81,73,.15);color:var(--bearish)}
.pill-neutral{background:rgba(210,153,34,.15);color:var(--neutral)}

/* ── Spinner ── */
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
.spinner-sm{width:18px;height:18px;border-width:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box{display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:30px;color:var(--muted);font-size:.8rem}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{padding:8px 10px;text-align:left;color:var(--muted);font-weight:600;
  border-bottom:1px solid var(--border);font-size:.75rem}
td{padding:7px 10px;border-bottom:1px solid rgba(48,54,61,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── Sector bar chart ── */
.sector-chart{display:flex;flex-direction:column;gap:8px}
.sector-row-item{display:flex;align-items:center;gap:8px;font-size:.8rem}
.sector-label{width:90px;text-align:right;color:var(--muted);flex-shrink:0;font-size:.75rem}
.sector-bar-wrap{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.sector-bar{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding:0 6px}
.sector-val{font-size:.72rem;font-weight:700;white-space:nowrap}

/* ── Markdown renderer ── */
.md-render{line-height:1.7;font-size:.88rem;color:var(--text)}
.md-render h2{font-size:1rem;font-weight:700;color:var(--accent);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.md-render h3{font-size:.9rem;font-weight:700;color:var(--text);margin:12px 0 6px}
.md-render strong{color:#e6edf3;font-weight:700}
.md-render ul{padding-left:18px;margin:6px 0}
.md-render li{margin:3px 0}
.md-render hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md-render em{color:var(--muted);font-style:italic}
.md-render p{margin:4px 0}

/* ── Verdict box (macro bull/bear) ── */
.verdict-box{border-radius:10px;padding:18px 24px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.verdict-box.bull{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.35)}
.verdict-box.bear{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.35)}
.verdict-box.neutral{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.35)}
.verdict-icon{font-size:2.2rem;flex-shrink:0}
.verdict-label{font-size:1.4rem;font-weight:800}
.verdict-sub{font-size:.82rem;color:var(--muted);margin-top:2px}
.verdict-box.bull .verdict-label{color:var(--bullish)}
.verdict-box.bear .verdict-label{color:var(--bearish)}
.verdict-box.neutral .verdict-label{color:var(--neutral)}

/* ── AI Picks Cards ── */
.picks-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1200px){.picks-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.picks-grid{grid-template-columns:1fr}}
.pick-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;
  display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all .15s}
.pick-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.pick-header{display:flex;align-items:center;justify-content:space-between}
.pick-ticker{font-size:1.1rem;font-weight:800;color:var(--accent)}
.pick-name{font-size:.8rem;color:var(--muted)}
.score-badge{background:linear-gradient(135deg,#1a3a5c,#0d2137);
  color:var(--accent);border:1px solid rgba(88,166,255,.3);
  font-size:.9rem;font-weight:800;padding:4px 10px;border-radius:8px;min-width:44px;text-align:center}
.pick-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:.78rem}
.meta-item{display:flex;flex-direction:column;gap:1px}
.meta-label{color:var(--muted);font-size:.68rem}
.meta-val{font-weight:600;color:var(--text)}
.dimensions{display:flex;flex-direction:column;gap:4px}
.dim-row{display:flex;align-items:center;gap:8px;font-size:.74rem}
.dim-name{width:48px;color:var(--muted);flex-shrink:0}
.dim-dots{display:flex;gap:3px}
.dim-dot{width:10px;height:10px;border-radius:50%;background:var(--surface2);border:1px solid var(--border)}
.dim-dot.filled{background:var(--accent);border-color:var(--accent)}
.pick-analysis{font-size:.78rem;color:var(--muted);line-height:1.5;
  border-left:2px solid var(--border);padding-left:8px}

/* ── Market Breadth ── */
.breadth-bar{height:12px;border-radius:6px;overflow:hidden;display:flex;margin:8px 0}
.breadth-up{background:var(--bullish)}
.breadth-flat{background:var(--neutral)}
.breadth-down{background:var(--bearish)}

/* ── Sub-tabs ── */
.sub-tabs{display:flex;gap:4px;margin-bottom:16px}
.sub-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.82rem;font-weight:600;transition:all .15s}
.sub-tab.active{background:var(--accent);border-color:var(--accent);color:#000}
.sub-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}

/* ── News ── */
.news-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(48,54,61,.5)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:.88rem;color:var(--text);font-weight:600;flex:1;line-height:1.4}
.news-meta{display:flex;gap:8px;font-size:.72rem;color:var(--muted);margin-top:3px;align-items:center}
.news-sentiment{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.sent-bull{background:rgba(63,185,80,.15);color:var(--bullish)}
.sent-bear{background:rgba(248,81,73,.15);color:var(--bearish)}
.sent-neutral{background:rgba(210,153,34,.15);color:var(--neutral)}

/* ── Toast ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;font-size:.82rem;min-width:220px;max-width:360px;
  animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast.success{border-left:3px solid var(--bullish)}
.toast.error{border-left:3px solid var(--bearish)}
.toast.info{border-left:3px solid var(--accent)}
.toast-out{animation:slideOut .3s ease forwards}
@keyframes slideOut{to{opacity:0;transform:translateX(20px)}}

/* ── Stat box ── */
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;flex:1;min-width:130px}
.stat-label{font-size:.72rem;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:1.2rem;font-weight:800}

/* ── Fundamental grid ── */
.fd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fd-item{display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:var(--surface2);border-radius:6px;font-size:.83rem}
.fd-label{color:var(--muted)}
.fd-val{font-weight:700}

/* ── Modal overlay ── */
#pick-modal{display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  overflow-y:auto;padding:20px}
#pick-modal.open{display:flex;align-items:flex-start;justify-content:center}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:960px;margin:auto;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7)}
.modal-header{background:var(--surface2);border-bottom:1px solid var(--border);
  padding:16px 20px;display:flex;align-items:center;gap:14px}
.modal-stock-info{flex:1}
.modal-ticker{font-size:1.4rem;font-weight:800;color:var(--accent)}
.modal-name{font-size:.85rem;color:var(--muted)}
.modal-price{font-size:1.6rem;font-weight:800}
.modal-change{font-size:.9rem;font-weight:700;margin-top:2px}
.modal-close{background:none;border:1px solid var(--border);color:var(--muted);
  width:36px;height:36px;border-radius:8px;font-size:1.1rem;transition:all .15s;flex-shrink:0}
.modal-close:hover{border-color:var(--bearish);color:var(--bearish)}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.modal-tab{padding:12px 20px;font-size:.85rem;font-weight:600;color:var(--muted);
  border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-pane{display:none;padding:20px}
.modal-pane.active{display:block}

/* ── Modal sub-tabs (chart intervals) ── */
.chart-tabs{display:flex;gap:4px;margin-bottom:12px}
.chart-tab{padding:5px 14px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;transition:all .15s}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#000}
.chart-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}

/* ── Order book depth ── */
.depth-row{display:flex;align-items:center;gap:8px;font-size:.78rem;margin:3px 0}
.depth-side-ask{color:var(--bearish);font-weight:700;width:70px;text-align:right}
.depth-side-bid{color:var(--bullish);font-weight:700;width:70px}
.depth-price{width:70px;text-align:center;font-weight:700;color:var(--text)}
.depth-bar-wrap{flex:1;height:14px;background:var(--surface2);border-radius:3px;overflow:hidden}
.depth-bar-ask{height:100%;background:rgba(248,81,73,.4);border-radius:3px;margin-left:auto}
.depth-bar-bid{height:100%;background:rgba(63,185,80,.4);border-radius:3px}
.depth-vol{width:60px;text-align:right;color:var(--muted);font-size:.72rem}

/* ── Misc helpers ── */
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.flex{display:flex}.flex-1{flex:1}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}
.text-muted{color:var(--muted)}.text-sm{font-size:.8rem}.text-xs{font-size:.72rem}
.fw-7{font-weight:700}.fw-8{font-weight:800}
.color-bull{color:var(--bullish)}.color-bear{color:var(--bearish)}.color-acc{color:var(--accent)}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;border:1px solid;transition:all .15s}
.btn-accent{background:rgba(88,166,255,.1);border-color:rgba(88,166,255,.4);color:var(--accent)}
.btn-accent:hover{background:rgba(88,166,255,.2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  padding:8px 14px;border-radius:6px;font-size:.85rem;transition:all .15s}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>

<nav id="top-nav">
  <div class="nav-brand">📈 台灣股市</div>
  <button class="nav-tab active" onclick="switchPage('p1')">儀表板</button>

</nav>

<!-- ════════ PAGE 1 — 儀表板 ════════ -->

<div class="container">

<!-- ════════ PAGE 2 — AI選股 ════════ -->
<div id="p2" class="page">
<div class="container">

<div class="sec-hdr">AI 選股推薦</div>

<!-- Market breadth -->
<div class="card mb-16" id="breadth-card">
  <div class="loading-box"><div class="spinner spinner-sm"></div><div>計算市場寬度…</div></div>
</div>

<!-- Sub-tabs -->
<div class="sub-tabs">
  <button class="sub-tab active" onclick="switchPicksTab('listed',this)">上市</button>
  <button class="sub-tab" onclick="switchPicksTab('otc',this)">上櫃</button>
  <button class="sub-tab" onclick="switchPicksTab('emerging',this)">興櫃</button>
</div>

<div id="picks-grid" class="picks-grid">
  <div class="loading-box" style="grid-column:1/-1"><div class="spinner"></div><div>AI 選股分析中…</div></div>
</div>

</div>
</div>

<!-- ════════ Pick Detail Modal ════════ -->
<div id="pick-modal" onclick="modalBackdropClick(event)">
  <div class="modal-box">
    <!-- Header -->
    <div class="modal-header">
      <div class="modal-stock-info">
        <div style="display:flex;align-items:baseline;gap:10px">
          <span class="modal-ticker" id="m-ticker"></span>
          <span class="modal-name" id="m-name"></span>
        </div>
      </div>
      <div style="text-align:right;margin-right:16px">
        <div class="modal-price" id="m-price"></div>
        <div class="modal-change" id="m-change"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <!-- Tab strip -->
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchModalTab('chart',this)">盤面</button>
      <button class="modal-tab" onclick="switchModalTab('ta',this)">技術評分</button>
      <button class="modal-tab" onclick="switchModalTab('chip',this)">大戶籌碼</button>
      <button class="modal-tab" onclick="switchModalTab('trade',this)">交易建議</button>
    </div>
    <!-- Panes -->

// MARKDOWN
// ═══════════════════════════════════════════════════════════
function renderMarkdown(text) {
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hupli]|$)(.+)/gm, '<p>$1</p>');
}

  let totalForeign = 0, totalSit = 0, totalDealer = 0;
  stocks.forEach(s => { totalForeign+=s.foreign; totalSit+=s.sit; totalDealer+=s.dealer; });

    return `<span class="${cls} fw-8">${v>=0?'+':''}${(v/1000).toFixed(0)}${unit}</span>`;
  };

  document.getElementById('institutional-summary').innerHTML = `
    <div class="flex gap-12" style="flex-wrap:wrap">
      <div class="stat-box" style="flex:1;min-width:120px">

        <div class="stat-val">${cv(totalSit)}</div>
      </div>
      <div class="stat-box" style="flex:1;min-width:120px">
        <div class="stat-label">自營商合計</div>
        <div class="stat-val">${cv(totalDealer)}</div>
      </div>
      <div class="stat-box" style="flex:1;min-width:120px">
        <div class="stat-label">三大合計</div>
        <div class="stat-val">${cv(totalForeign+totalSit+totalDealer)}</div>
      </div>
    </div>`;

  const sorted = [...stocks].sort((a,b) => b.foreign - a.foreign);
  const top10Buy  = sorted.filter(s=>s.foreign>0).slice(0,10);
  const top10Sell = sorted.filter(s=>s.foreign<0).sort((a,b)=>a.foreign-b.foreign).slice(0,10);

  const makeTable = (items) => {
    if (!items.length) return '<div class="text-muted text-sm" style="padding:10px">暫無資料</div>';
    return `<table>
      <thead><tr><th>代碼</th><th>名稱</th><th>外資</th><th>投信</th><th>合計</th></tr></thead>
      <tbody>${items.map(s => `<tr>
        <td class="color-acc fw-7">${s.code}</td>
        <td>${s.name}</td>
        <td class="${s.foreign>=0?'color-bull':'color-bear'}">${s.foreign>=0?'+':''}${(s.foreign/1000).toFixed(1)}K</td>
        <td class="${s.sit>=0?'color-bull':'color-bear'}">${s.sit>=0?'+':''}${(s.sit/1000).toFixed(1)}K</td>
        <td class="${s.net>=0?'color-bull':'color-bear'} fw-7">${s.net>=0?'+':''}${(s.net/1000).toFixed(1)}K</td>
      </tr>`).join('')}</tbody></table>`;
  };

  document.getElementById('inst-buy-table').innerHTML  = makeTable(top10Buy);
  document.getElementById('inst-sell-table').innerHTML = makeTable(top10Sell);
}

async function loadSectorRotation() {
  try {
    const res = await fetch('/api/market?type=listed', {signal: AbortSignal.timeout(12000)});
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error('empty');

    const sectorMap = {};
    data.forEach(s => {
      const cat = s.IndustryName || s.industry || s.Type || '其他';
      let sector = '其他';
      if (cat.includes('半導體')) sector = '半導體';
      else if (cat.includes('電腦') || cat.includes('週邊')) sector = '電腦及週邊';
      else if (cat.includes('光電')) sector = '光電';
      else if (cat.includes('金融') || cat.includes('保險')) sector = '金融保險';
      else if (cat.includes('電子零組件')) sector = '電子零組件';
      else if (cat.includes('生技') || cat.includes('醫療')) sector = '生技醫療';
      else if (cat.includes('鋼鐵')) sector = '鋼鐵';
      else if (cat.includes('航運')) sector = '航運';

      if (!sectorMap[sector]) sectorMap[sector] = {sum:0,count:0};
      const close = parseFloat(String(s.ClosingPrice||0).replace(/,/g,''));
      const open  = parseFloat(String(s.OpeningPrice||0).replace(/,/g,''));
      if (close > 0 && open > 0) {
        sectorMap[sector].sum += (close - open) / open * 100;
        sectorMap[sector].count++;
      }
    });

    const sectors = Object.entries(sectorMap)
      .map(([name,{sum,count}]) => ({name, avg: count ? sum/count : 0}))
      .sort((a,b) => b.avg - a.avg);

    renderSectorChart(sectors.slice(0,8));
  } catch(e) {
    renderSectorChart(SECTOR_FALLBACK);
  }
}

function renderSectorChart(sectors) {
  const maxAbs = Math.max(...sectors.map(s => Math.abs(s.avg)), 0.5);
  document.getElementById('sector-chart').innerHTML = `
    <div class="sector-chart">
      ${sectors.map(s => {
        const pct = (Math.abs(s.avg) / maxAbs * 100).toFixed(1);
        const isPos = s.avg >= 0;
        return `<div class="sector-row-item">
          <div class="sector-label">${s.name}</div>
          <div class="sector-bar-wrap">
            ${isPos
              ? `<div class="sector-bar" style="width:${pct}%;background:linear-gradient(90deg,rgba(63,185,80,.2),rgba(63,185,80,.6))">
                  <span class="sector-val color-bull">+${s.avg.toFixed(2)}%</span>
                 </div>`
              : `<div class="sector-bar" style="width:${pct}%;background:linear-gradient(90deg,rgba(248,81,73,.6),rgba(248,81,73,.2));margin-left:auto">
                  <span class="sector-val color-bear">${s.avg.toFixed(2)}%</span>
                 </div>`
            }
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderMacro(el, text, isAI) {
  // Detect verdict from text
  const bullKeywords = ['多頭','偏多','看多','bullish','上漲','強勢'];
  const bearKeywords = ['空頭','偏空','看空','bearish','下跌','修正'];
  let verdict = 'neutral', verdictLabel = '中性', verdictIcon = '⚖️';
  const lowerText = text.toLowerCase();
  const bullScore = bullKeywords.filter(k => text.includes(k)).length;
  const bearScore = bearKeywords.filter(k => text.includes(k)).length;
  if (bullScore > bearScore + 1) { verdict='bull'; verdictLabel='多 (偏多)'; verdictIcon='🟢'; }
  else if (bearScore > bullScore + 1) { verdict='bear'; verdictLabel='空 (偏空)'; verdictIcon='🔴'; }

  el.innerHTML = `
    <div class="verdict-box ${verdict}">
      <div class="verdict-icon">${verdictIcon}</div>
      <div>
        <div class="verdict-label">${verdictLabel}</div>
        <div class="verdict-sub">AI 綜合研判當前市場多空傾向</div>

}

}

function openPickModal(p) {
  currentModalPick = p;
  const isOtc = parseInt(p.code) >= 4000 && !String(p.code).startsWith('9');
  currentChartSymbol = (isOtc || currentPicksMarket !== 'listed') ? `TPEX:${p.code}` : `TWSE:${p.code}`;

  document.getElementById('m-ticker').textContent = p.code;
  document.getElementById('m-name').textContent   = p.name;
  const priceEl  = document.getElementById('m-price');
  const changeEl = document.getElementById('m-change');
  priceEl.textContent  = `${p.close} 元`;
  priceEl.className    = 'modal-price';
  const upPct = parseFloat(p.upsidePct) || 0;
  changeEl.textContent = `目標 +${p.upsidePct}%`;
  changeEl.className   = 'modal-change color-bull';

  // Reset all panes to first tab
  switchModalTab('chart', document.querySelector('.modal-tab'));
  document.querySelectorAll('.modal-tab').forEach((t,i) => t.classList.toggle('active', i===0));

  // Load chart (default: daily)
  document.querySelectorAll('.chart-tab').forEach((t,i) => t.classList.toggle('active', i===1));
  loadModalChart('D');

  // Load TA widget
  loadModalTA();

  // Load chip data
  loadModalChip(p);

  // Load trade recommendation
  loadModalTrade(p);

  document.getElementById('pick-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('pick-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function modalBackdropClick(e) {
  if (e.target === document.getElementById('pick-modal')) closeModal();
}

function switchModalTab(tab, btn) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-pane').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById(`mpane-${tab}`).classList.add('active');
}

// ── TA tab ──
function loadModalTA() {
  const wrap = document.getElementById('modal-ta-wrap');
  wrap.innerHTML = '';
  const cfg = JSON.stringify({
    interval:'1D', width:'100%', isTransparent:true, height:280,
    symbol: currentChartSymbol, showIntervalTabs: true,
    displayMode:'single', locale:'zh_TW', colorTheme:'dark',
  });
  wrap.innerHTML = `
    <div class="tradingview-widget-container" style="height:280px">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js"
        async>${cfg}<\/script>
    </div>`;

  // Timeframe signal table
  const p = currentModalPick || {};
  const score = p.score || 60;
  const seed  = parseInt(String(p.code).replace(/\D/g,'').slice(-4)) || 1234;

  function seededRand(s) { let x = Math.sin(s)*10000; return x - Math.floor(x); }

  const timeframes = [
    {label:'5分鐘', tf:'5m'},
    {label:'1小時', tf:'1h'},
    {label:'日線',  tf:'1d'},
    {label:'週線',  tf:'1w'},
  ];

  const trends = ['強多','偏多','中性','偏空','強空'];
  const macds  = ['金叉↑','多頭排列','翻正','零軸附近','死叉↓'];
  const bbs    = ['突破上軌','中軌以上','中軌附近','中軌以下','觸碰下軌'];

  const tbody = document.getElementById('modal-tf-tbody');
  tbody.innerHTML = timeframes.map((tf, i) => {
    const r1  = seededRand(seed + i*7);
    const r2  = seededRand(seed + i*13);
    const r3  = seededRand(seed + i*17);
    const ti  = Math.max(0, Math.min(4, Math.round(2 - (score-50)/25 + (r1-0.5)*2)));
    const rsi = (40 + score*0.25 + (r2-0.5)*20).toFixed(1);
    const mi  = Math.max(0, Math.min(4, Math.round(2 - (score-50)/30 + (r3-0.5)*1.5)));
    const bi  = Math.max(0, Math.min(4, Math.round(ti + (seededRand(seed+i*19)-0.5))));
    const trendCls = ti <= 1 ? 'color-bull' : ti >= 3 ? 'color-bear' : 'color-acc';
    const rsiCls   = parseFloat(rsi) > 70 ? 'color-bear' : parseFloat(rsi) < 30 ? 'color-bull' : '';
    return `<tr>
      <td class="fw-7">${tf.label}</td>
      <td class="${trendCls} fw-7">${trends[ti]}</td>
      <td class="${rsiCls}">${rsi}</td>
      <td class="${mi<=1?'color-bull':mi>=3?'color-bear':''}">${macds[mi]}</td>
      <td class="${bi<=1?'color-bull':bi>=3?'color-bear':''}">${bbs[bi]}</td>
    </tr>`;
  }).join('');
}

// ── Chip tab ──
async function loadModalChip(p) {
  // Institutional
  const instEl = document.getElementById('modal-chip-inst');
  try {
    const res  = await fetch('/api/market?type=institutional', {signal: AbortSignal.timeout(10000)});
    const data = await res.json();
    const rec  = Array.isArray(data) ? data.find(r => (r.Code||r.StockNo||'') === String(p.code)) : null;
    if (rec) {
      const foreign = parseFloat(String(rec.Foreign_Diff_Volume||0).replace(/,/g,'')) || 0;
      const sit     = parseFloat(String(rec.Investment_Diff_Volume||0).replace(/,/g,'')) || 0;
      const dealer  = parseFloat(String(rec.Dealer_Diff_Volume||0).replace(/,/g,'')) || 0;
      instEl.innerHTML = chipInstHTML(foreign, sit, dealer);
    } else {
      throw new Error('not found');
    }
  } catch(e) {
    // Simulate from fallback
    const fb = INST_FALLBACK.find(d => d.code === String(p.code));
    if (fb) {
      instEl.innerHTML = chipInstHTML(fb.foreign, fb.sit, fb.dealer);
    } else {
      const seed = parseInt(String(p.code).replace(/\D/g,'').slice(-4)) || 1234;
      const f = Math.round((Math.sin(seed)*5000));
      const s = Math.round((Math.sin(seed+3)*1500));
      const d = Math.round((Math.sin(seed+7)*800));
      instEl.innerHTML = chipInstHTML(f, s, d);
    }
  }

  // Order book depth
  const price = parseFloat(p.close) || 100;
  renderDepth(price);

  // Chip distribution pie
  const seed2 = parseInt(String(p.code).replace(/\D/g,'').slice(-4)) || 5678;
  function sr(s) { let x = Math.sin(s)*10000; return x - Math.floor(x); }
  const bigPct  = Math.round(35 + sr(seed2)*25);
  const midPct  = Math.round(25 + sr(seed2+1)*20);
  const smallPct = 100 - bigPct - midPct;
  document.getElementById('modal-chip-pie').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      ${[['大戶',bigPct,'var(--accent)'],['中戶',midPct,'var(--neutral)'],['散戶',smallPct,'var(--muted)']].map(([label,pct,color])=>`
        <div style="display:flex;align-items:center;gap:10px;font-size:.8rem">
          <div style="width:40px;color:${color};font-weight:700">${label}</div>
          <div style="flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${color};opacity:.7;border-radius:4px"></div>
          </div>
          <div style="width:36px;text-align:right;font-weight:700">${pct}%</div>
        </div>`).join('')}
    </div>`;

  // Volume analysis (relative to average)
  const days = ['5日前','4日前','3日前','2日前','昨日'];
  const vols = days.map((_,i) => {
    const v = 0.5 + sr(seed2 + i*3) * 1.5;
    return {day: days[i], rel: v};
  });
  const maxRel = Math.max(...vols.map(v=>v.rel));
  document.getElementById('modal-vol-chart').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px">
      ${vols.map(v => {
        const pct = (v.rel / maxRel * 100).toFixed(0);
        const cls = v.rel >= 1 ? 'color-bull' : 'color-bear';
        return `<div style="display:flex;align-items:center;gap:8px;font-size:.78rem">
          <div style="width:40px;color:var(--muted)">${v.day}</div>
          <div style="flex:1;height:16px;background:var(--surface2);border-radius:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${v.rel>=1?'rgba(63,185,80,.6)':'rgba(248,81,73,.6)'};border-radius:4px"></div>
          </div>
          <div class="${cls}" style="width:44px;text-align:right;font-weight:700">${v.rel.toFixed(2)}x</div>
        </div>`;
      }).join('')}
    </div>
    <div class="text-xs text-muted mt-8">相對均量倍數 (>1 = 爆量)</div>`;
}

function chipInstHTML(foreign, sit, dealer) {
  const net = foreign + sit + dealer;
  const fv = (v) => {
    const cls = v>=0?'color-bull':'color-bear';
    const s   = v>=0?'+':'';
    return `<span class="${cls} fw-7">${s}${(v/1000).toFixed(1)}K張</span>`;
  };
  return `
    <div class="fd-item"><span class="fd-label">外資</span>${fv(foreign)}</div>
    <div class="fd-item"><span class="fd-label">投信</span>${fv(sit)}</div>
    <div class="fd-item"><span class="fd-label">自營商</span>${fv(dealer)}</div>
    <div class="fd-item"><span class="fd-label">三大合計</span>${fv(net)}</div>`;
}

function renderDepth(price) {
  const depthEl = document.getElementById('modal-depth');
  const levels  = 5;
  const asks = [], bids = [];
  for (let i = 1; i <= levels; i++) {
    const askPx  = (price * (1 + i * 0.005)).toFixed(2);
    const bidPx  = (price * (1 - i * 0.005)).toFixed(2);
    const askVol = Math.round(50 + Math.random()*300);
    const bidVol = Math.round(50 + Math.random()*300);
    asks.unshift({px: askPx, vol: askVol});
    bids.push({px: bidPx, vol: bidVol});
  }
  const maxVol = Math.max(...asks.map(a=>a.vol), ...bids.map(b=>b.vol));

  const askRows = asks.map(a => {
    const pct = (a.vol / maxVol * 100).toFixed(0);
    return `<div class="depth-row">
      <div class="depth-side-ask">${a.vol}</div>
      <div style="flex:1;height:14px;background:var(--surface2);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:rgba(248,81,73,.4);float:right;border-radius:3px"></div>
      </div>
      <div class="depth-price color-bear">${a.px}</div>
    </div>`;
  }).join('');

  const currentRow = `<div style="text-align:center;font-size:.85rem;font-weight:800;padding:6px 0;color:var(--text);border-top:1px dashed var(--border);border-bottom:1px dashed var(--border)">
    現價 ${price.toFixed(2)}
  </div>`;

  const bidRows = bids.map(b => {
    const pct = (b.vol / maxVol * 100).toFixed(0);
    return `<div class="depth-row">
      <div class="depth-price color-bull">${b.px}</div>
      <div style="flex:1;height:14px;background:var(--surface2);border-radius:3px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:rgba(63,185,80,.4);border-radius:3px"></div>
      </div>
      <div class="depth-side-bid">${b.vol}</div>
    </div>`;
  }).join('');

  depthEl.innerHTML = `
    <div style="font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:6px">
      <span>委賣量</span><span>價格</span><span>委買量</span>
    </div>
    ${askRows}${currentRow}${bidRows}
    <div class="text-xs text-muted mt-8">※ 掛單數據為模擬示意，實際數據需串接券商API</div>`;
}

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
